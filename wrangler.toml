name = 'mtv-langauto'
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

# 静态资源配置
# Cloudflare Workers Assets 用于服务静态文件
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "mtv-d1"
database_id = "0a652120-e447-479c-aec6-e6366e6848bb"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

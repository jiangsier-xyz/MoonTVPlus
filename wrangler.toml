name = 'mtv-langauto'
compatibility_date = "2026-04-03"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# 静态资源配置
# Cloudflare Workers Assets 用于服务静态文件
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NODE_ENV = "production"
BUILD_TARGET = "cloudflare"
